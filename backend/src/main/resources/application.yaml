server:
  port: 8080

spring:
  application:
    name: notes
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/notes_db}
    username: ${DB_USERNAME:app_user}
    password: ${DB_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

jwt:
  secret: ${JWT_SECRET:mySecretKeyForJWT12345678901234567890}
  expiration: ${JWT_EXPIRATION:86400}

app:
  admin-secret: ${ADMIN_SECRET:admin-secret-2024}

logging:
  level:
    com.minibytes.notes: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n"
  file:
    name: logs/notes-app.log
